<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Firebase 即時文字雲</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1/build/d3.layout.cloud.js"></script>
    <style>
      :root {
        --bg: #f7f7f2;
        --ink: #202124;
        --muted: #60646c;
        --line: #d8d8d0;
        --panel: #ffffff;
        --accent: #1769aa;
        --accent-strong: #0f4d7f;
        --green: #217a57;
        --red: #b42318;
        --yellow: #b7791f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, "Microsoft JhengHei", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .topbar {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 18px 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
      }

      .status {
        min-width: 138px;
        text-align: right;
        font-size: 14px;
        color: var(--muted);
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 32px;
        display: grid;
        grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
        gap: 24px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .controls {
        padding: 18px;
        align-self: start;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        color: var(--muted);
      }

      input {
        width: 100%;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 12px;
        font-size: 17px;
        color: var(--ink);
        background: #fff;
      }

      input:focus {
        outline: 3px solid rgba(23, 105, 170, 0.2);
        border-color: var(--accent);
      }

      button {
        height: 44px;
        border: 0;
        border-radius: 6px;
        padding: 0 16px;
        background: var(--accent);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        cursor: not-allowed;
        background: #a8adb4;
      }

      .message {
        min-height: 22px;
        margin-top: 12px;
        font-size: 14px;
        color: var(--muted);
      }

      .message.ok {
        color: var(--green);
      }

      .message.error {
        color: var(--red);
      }

      .stats {
        margin-top: 18px;
        display: grid;
        gap: 10px;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
        font-size: 14px;
      }

      .stat-row span:first-child {
        color: var(--muted);
      }

      .cloud-wrap {
        min-height: 620px;
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
      }

      .cloud-head {
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      #cloud {
        width: 100%;
        height: 100%;
        min-height: 540px;
      }

      .empty {
        height: 100%;
        min-height: 540px;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--muted);
        text-align: center;
      }

      .top-words {
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .top-words li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 15px;
      }

      .word-count {
        color: var(--yellow);
        font-weight: 700;
      }

      @media (max-width: 820px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .status {
          text-align: left;
        }

        main {
          grid-template-columns: 1fr;
        }

        .cloud-wrap {
          min-height: 520px;
        }

        #cloud,
        .empty {
          min-height: 460px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="topbar">
          <h1>Firebase 即時文字雲</h1>
          <div class="status" id="connectionStatus">連線準備中</div>
        </div>
      </header>

      <main>
        <section class="panel controls">
          <form id="wordForm">
            <label>
              輸入一個詞語
              <input id="wordInput" maxlength="20" autocomplete="off" placeholder="例如：AI、教學、創意">
            </label>
            <button id="submitButton" type="submit">送出</button>
          </form>
          <div class="message" id="message"></div>

          <div class="stats">
            <div class="stat-row">
              <span>總投稿數</span>
              <strong id="totalCount">0</strong>
            </div>
            <div class="stat-row">
              <span>不同詞語</span>
              <strong id="uniqueCount">0</strong>
            </div>
          </div>

          <ul class="top-words" id="topWords"></ul>
        </section>

        <section class="panel cloud-wrap">
          <div class="cloud-head">
            <span>即時同步 Firestore</span>
            <span id="lastUpdated">尚無資料</span>
          </div>
          <div id="cloud"></div>
        </section>
      </main>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
      import {
        addDoc,
        collection,
        getFirestore,
        limit,
        onSnapshot,
        orderBy,
        query,
        serverTimestamp
      } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

      const firebaseConfig = {
        projectId: "codex-9c60b",
        appId: "1:180859313095:web:01e7ef13701922a3c317e2",
        storageBucket: "codex-9c60b.firebasestorage.app",
        apiKey: "AIzaSyAJh1p5bDzM8I9uijzGqsp2NA2uLB8hp9Q",
        authDomain: "codex-9c60b.firebaseapp.com",
        messagingSenderId: "180859313095"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const wordsRef = collection(db, "wordcloud_words");

      const form = document.querySelector("#wordForm");
      const input = document.querySelector("#wordInput");
      const button = document.querySelector("#submitButton");
      const message = document.querySelector("#message");
      const status = document.querySelector("#connectionStatus");
      const totalCount = document.querySelector("#totalCount");
      const uniqueCount = document.querySelector("#uniqueCount");
      const topWords = document.querySelector("#topWords");
      const cloud = document.querySelector("#cloud");
      const lastUpdated = document.querySelector("#lastUpdated");

      let currentWords = [];
      let resizeTimer = 0;

      function cleanWord(value) {
        return value.trim().replace(/\s+/g, " ").slice(0, 20);
      }

      function setMessage(text, type = "") {
        message.textContent = text;
        message.className = type ? `message ${type}` : "message";
      }

      function aggregate(snapshot) {
        const counts = new Map();
        let total = 0;

        snapshot.forEach((doc) => {
          const text = cleanWord(doc.data().text || "");
          if (!text) return;
          total += 1;
          counts.set(text, (counts.get(text) || 0) + 1);
        });

        return {
          total,
          words: [...counts.entries()]
            .map(([text, count]) => ({ text, count }))
            .sort((a, b) => b.count - a.count || a.text.localeCompare(b.text, "zh-Hant"))
        };
      }

      function renderTopWords(words) {
        topWords.innerHTML = "";
        words.slice(0, 8).forEach((word) => {
          const item = document.createElement("li");
          item.innerHTML = `<span>${escapeHtml(word.text)}</span><span class="word-count">${word.count}</span>`;
          topWords.appendChild(item);
        });
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderCloud(words) {
        currentWords = words;
        cloud.innerHTML = "";

        if (!words.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "還沒有投稿。輸入第一個詞語開始建立文字雲。";
          cloud.appendChild(empty);
          return;
        }

        const width = Math.max(cloud.clientWidth, 320);
        const height = Math.max(cloud.clientHeight, 460);
        const max = Math.max(...words.map((word) => word.count));
        const colors = ["#1769aa", "#217a57", "#7a3e9d", "#b7791f", "#c2410c", "#365314"];

        const layoutWords = words.slice(0, 80).map((word, index) => ({
          text: word.text,
          size: 18 + (word.count / max) * 54,
          count: word.count,
          color: colors[index % colors.length]
        }));

        d3.layout.cloud()
          .size([width, height])
          .words(layoutWords)
          .padding(4)
          .rotate(() => (Math.random() > 0.82 ? 90 : 0))
          .font("Microsoft JhengHei")
          .fontSize((word) => word.size)
          .on("end", drawCloud)
          .start();

        function drawCloud(positionedWords) {
          d3.select("#cloud")
            .append("svg")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("width", "100%")
            .attr("height", "100%")
            .append("g")
            .attr("transform", `translate(${width / 2},${height / 2})`)
            .selectAll("text")
            .data(positionedWords)
            .enter()
            .append("text")
            .style("font-family", "Microsoft JhengHei, Arial, sans-serif")
            .style("font-size", (word) => `${word.size}px`)
            .style("font-weight", 700)
            .style("fill", (word) => word.color)
            .attr("text-anchor", "middle")
            .attr("transform", (word) => `translate(${word.x},${word.y}) rotate(${word.rotate})`)
            .text((word) => word.text)
            .append("title")
            .text((word) => `${word.text}: ${word.count}`);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = cleanWord(input.value);

        if (!text) {
          setMessage("請先輸入詞語。", "error");
          input.focus();
          return;
        }

        button.disabled = true;
        setMessage("送出中...");

        try {
          await addDoc(wordsRef, {
            text,
            createdAt: serverTimestamp(),
            source: "github-pages-wordcloud"
          });
          input.value = "";
          setMessage("已送出，文字雲會即時更新。", "ok");
        } catch (error) {
          console.error(error);
          setMessage("送出失敗，請確認 Firestore 規則已部署。", "error");
        } finally {
          button.disabled = false;
          input.focus();
        }
      });

      onSnapshot(
        query(wordsRef, orderBy("createdAt", "desc"), limit(300)),
        (snapshot) => {
          status.textContent = "Firestore 已連線";
          const result = aggregate(snapshot);
          totalCount.textContent = String(result.total);
          uniqueCount.textContent = String(result.words.length);
          lastUpdated.textContent = result.total ? new Date().toLocaleTimeString("zh-TW") : "尚無資料";
          renderTopWords(result.words);
          renderCloud(result.words);
        },
        (error) => {
          console.error(error);
          status.textContent = "Firestore 連線失敗";
          setMessage("讀取失敗，請確認 Firestore 規則允許讀取 wordcloud_words。", "error");
        }
      );

      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = window.setTimeout(() => renderCloud(currentWords), 160);
      });
    </script>
  </body>
</html>
